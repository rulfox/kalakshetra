<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1440" height="900" fill="#1C1A17"/>
  <!-- subtle warm vignette -->
  <radialGradient id="vg" cx="50%" cy="60%" r="70%">
    <stop offset="0%" stop-color="#3a2a18" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1C1A17" stop-opacity="0"/>
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vg)"/>
  <!-- gold lotus motif, centred -->
  <g transform="translate(720,420)" opacity="0.22">
    <!-- outer petals -->
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(0)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(45)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(90)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(135)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(180)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(225)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(270)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(315)"/>
    <!-- inner petals -->
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(337.5)"/>
    <!-- centre dot -->
    <circle r="9" fill="#C9A227"/>
  </g>
  <!-- thin gold hairline frame -->
  <rect x="48" y="36" width="1344" height="828" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.18"/>
</svg>
