    <stop offset="0%" stop-color="#F3EDE2"/>
    <stop offset="100%" stop-color="#FAF7F0"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#wg)"/>
  <!-- gold lotus motif -->
  <g transform="translate(300,390)" opacity="0.28">
