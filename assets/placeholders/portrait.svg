    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(337.5)"/>
