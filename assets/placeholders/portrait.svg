    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(135)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(180)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(225)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(270)"/>
    <ellipse cx="0" cy="-52" rx="10" ry="28" fill="#C9A227" transform="rotate(315)"/>
    <ellipse cx="0" cy="-32" rx="7" ry="18" fill="#C9A227" transform="rotate(22.5)"/>
