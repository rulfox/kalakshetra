<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 26px; background: var(--ivory); display: flex; flex-direction: column; gap: 20px; }
  .eb { display:inline-flex; align-items:center; gap:12px; }
  .eb i { width: 30px; height: 1px; background: var(--gold); display:inline-block; }
  .nav { display:flex; gap: 32px; }
  .nav a { font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink); }
</style>
</head>
<body>
  <div class="eb"><i></i><span class="eyebrow">The Philosophy</span></div>
  <div class="nav"><a>Shop</a><a>Lookbook</a><a>Our Story</a><a>Contact</a></div>
</body>
</html>
