<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Text" subtitle="Near-black on light · ivory on dark · WhatsApp green" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 64px; display:flex; align-items:flex-end; padding:8px; }
  .chip span { font-family: var(--font-display); font-size: 20px; }
  .meta { padding: 9px 11px; font-family: var(--font-body); }
  .name { font-size: 12px; font-weight: 600; color: var(--ink); }
  .hex { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ivory)"><span style="color:var(--ink)">Aa</span></div><div class="meta"><div class="name">Ink</div><div class="hex">#1C1A17 · --ink</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory)"><span style="color:var(--ink-soft)">Aa</span></div><div class="meta"><div class="name">Body</div><div class="hex">#4A453E · --ink-soft</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wood)"><span style="color:var(--on-dark)">Aa</span></div><div class="meta"><div class="name">On dark</div><div class="hex">#FAF7F0 · --on-dark</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--whatsapp)"><span style="color:#fff">Aa</span></div><div class="meta"><div class="name">WhatsApp</div><div class="hex">#25D366 · --whatsapp</div></div></div>
  </div>
</body>
</html>
