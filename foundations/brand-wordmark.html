<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; display: flex; min-height: 200px; font-family: var(--font-body); }
  .panel { flex: 1; display: flex; align-items: center; justify-content: center; }
  .light { background: var(--ivory); }
  .dark { background: var(--wood); }
  .mark { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .name { font-family: var(--font-display); font-size: 34px; font-weight: 600; letter-spacing: 0.01em; }
  .tag { font-size: 10px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; margin-top: 9px; }
</style>
</head>
<body>
  <div class="panel light">
    <div class="mark">
      <span class="name" style="color:var(--ink)">Kalakshetra</span>
      <span class="tag" style="color:var(--accent-strong)">Hand Painted with Love</span>
    </div>
  </div>
  <div class="panel dark">
    <div class="mark">
      <span class="name" style="color:var(--on-dark)">Kalakshetra</span>
      <span class="tag" style="color:var(--on-dark-soft)">Hand Painted with Love</span>
    </div>
  </div>
</body>
</html>
