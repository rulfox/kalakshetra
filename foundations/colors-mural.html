<!-- @dsCard group="Colors" viewport="700x150" name="Mural Accents" subtitle="Temple red · Kathakali green · indigo · mustard — <10% of any surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 9px 11px; font-family: var(--font-body); }
  .name { font-size: 12px; font-weight: 600; color: var(--ink); }
  .hex { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--temple-red)"></div><div class="meta"><div class="name">Temple red</div><div class="hex">#8B2E2E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--kathakali-green)"></div><div class="meta"><div class="name">Kathakali green</div><div class="hex">#1F5F5B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo)"></div><div class="meta"><div class="name">Indigo</div><div class="hex">#2E3A59</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--mustard)"></div><div class="meta"><div class="name">Mustard</div><div class="hex">#D99A2B</div></div></div>
  </div>
</body>
</html>
