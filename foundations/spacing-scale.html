<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base — generous, gallery-like rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: #fff; font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { text-align: center; }
  .bar { background: var(--gold); border-radius: var(--radius-sm); }
  .t { font-size: 10px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:24px;height:var(--space-2)"></div><div class="t">2 · 8</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-4)"></div><div class="t">4 · 16</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-5)"></div><div class="t">5 · 24</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-6)"></div><div class="t">6 · 32</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-7)"></div><div class="t">7 · 48</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-8)"></div><div class="t">8 · 64</div></div>
    <div class="col"><div class="bar" style="width:24px;height:var(--space-9)"></div><div class="t">9 · 96</div></div>
  </div>
</body>
</html>
