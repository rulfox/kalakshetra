<!-- @dsCard group="Colors" viewport="700x150" name="Kasavu Gold (primary metallic)" subtitle="The single signature accent — used sparingly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 70px; }
  .meta { padding: 10px 12px; font-family: var(--font-body); }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .hex { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="meta"><div class="name">Kasavu gold</div><div class="hex">#C9A227 · --gold</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-deep)"></div><div class="meta"><div class="name">Deep gold · hover</div><div class="hex">#B8860B · --gold-deep</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory); border-bottom:1px solid var(--gold-hairline); box-shadow: inset 0 0 0 1px var(--gold-hairline)"></div><div class="meta"><div class="name">Gold hairline</div><div class="hex">rgba(201,162,39,.45)</div></div></div>
  </div>
</body>
</html>
