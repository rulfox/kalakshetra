<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft, warm-tinted — never harsh black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 26px; background: var(--ivory); font-family: var(--font-body); }
  .row { display: flex; gap: 26px; }
  .col { text-align: center; }
  .box { width: 120px; height: 70px; background: #fff; border-radius: var(--radius-md); }
  .t { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="t">card</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lift)"></div><div class="t">lift · hover</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-float); background:var(--whatsapp)"></div><div class="t">float · WhatsApp</div></div>
  </div>
</body>
</html>
