<!-- @dsCard group="Colors" viewport="700x150" name="Earth Neutrals" subtitle="Ettukettu wood + terracotta — dark sections & warm accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 70px; }
  .meta { padding: 10px 12px; font-family: var(--font-body); }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .hex { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wood)"></div><div class="meta"><div class="name">Ettukettu wood</div><div class="hex">#5C4033 · --wood</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--terracotta)"></div><div class="meta"><div class="name">Terracotta</div><div class="hex">#B05E3B · --terracotta</div></div></div>
  </div>
</body>
</html>
