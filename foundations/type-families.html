<!-- @dsCard group="Type" viewport="700x190" name="Type Families" subtitle="Cormorant Garamond (display) + Inter (body/UI)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: #fff; display: flex; gap: 32px; }
  .col { flex: 1; }
  .lbl { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-strong); margin-bottom: 10px; }
  .serif { font-family: var(--font-serif); font-size: 44px; color: var(--ink); line-height: 1; }
  .serif .it { font-style: italic; }
  .sans { font-family: var(--font-sans); font-size: 30px; color: var(--ink); line-height: 1.1; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="col">
    <div class="lbl">Display · Serif</div>
    <div class="serif">Kalakshetra <span class="it">art</span></div>
    <div class="note">Cormorant Garamond · 400–700 · headlines & pull-quotes</div>
  </div>
  <div class="col">
    <div class="lbl">Body / UI · Sans</div>
    <div class="sans">Hand painted with love</div>
    <div class="note">Inter · 300–700 · paragraphs, nav, buttons</div>
  </div>
</body>
</html>
